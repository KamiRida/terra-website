<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fcd9a8"/>
      <stop offset="0.45" stop-color="#f6b873"/>
      <stop offset="0.7" stop-color="#e89b66"/>
      <stop offset="1" stop-color="#cf8f5a"/>
    </linearGradient>
    <radialGradient id="sun" cx="68%" cy="34%" r="34%">
      <stop offset="0" stop-color="#fff4d6"/>
      <stop offset="0.4" stop-color="#ffe6ad" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#ffe6ad" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hills" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a7b86a"/>
      <stop offset="1" stop-color="#6f9450"/>
    </linearGradient>
    <linearGradient id="hills2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fae5b"/>
      <stop offset="1" stop-color="#577a40"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#sun)"/>
  <circle cx="1090" cy="300" r="70" fill="#fff6e2"/>
  <!-- far hills -->
  <path d="M0 520 Q 400 440 800 500 T 1600 470 V900 H0 Z" fill="url(#hills)" opacity="0.85"/>
  <!-- mid field with rows -->
  <path d="M0 600 Q 500 540 1000 600 T 1600 580 V900 H0 Z" fill="url(#hills2)"/>
  <g stroke="#4d6e38" stroke-width="2" opacity="0.35">
    <path d="M120 900 Q 700 660 1500 690" fill="none"/>
    <path d="M60 900 Q 700 690 1560 720" fill="none"/>
    <path d="M20 900 Q 700 720 1600 760" fill="none"/>
    <path d="M0 880 Q 700 760 1600 800" fill="none"/>
  </g>
  <!-- foreground tree silhouette -->
  <path d="M60 900 C 120 600 240 560 250 520 C 300 560 330 640 320 900 Z" fill="#3f5c2e" opacity="0.9"/>
  <circle cx="210" cy="470" r="120" fill="#436330" opacity="0.92"/>
  <circle cx="300" cy="520" r="90" fill="#4a6c36" opacity="0.9"/>
  <text x="40" y="860" font-family="monospace" font-size="20" fill="#ffffff" opacity="0.5">PLACEHOLDER — swap /public/hero.jpg</text>
</svg>
